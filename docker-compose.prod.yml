# InvenTrack - Full stack (PostgreSQL + Redis + API + Client)
# Production: pulled from Docker Hub, deployed via CI/CD
# App: https://inventrack.agiloit.store | API: https://api.inventrack.agiloit.store

services:
  postgres:
    image: postgres:15-alpine
    container_name: inventrk-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
      POSTGRES_DB: inventrackdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: inventrk-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    image: ${DOCKERHUB_USERNAME}/inventrack-server:latest
    container_name: inventrk-server
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./server.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "npx prisma db push --skip-generate && node build/prisma/seed.js 2>/dev/null; node build/src/index.js"

  client:
    image: ${DOCKERHUB_USERNAME}/inventrack-client:latest
    container_name: inventrk-client
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./client.env
    depends_on:
      - server

volumes:
  postgres_data:
  redis_data:
